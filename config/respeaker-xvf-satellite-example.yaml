voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 0
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - if:
        condition:
          - lambda: return id(init_in_progress);
          - switch.is_on: mic_mute_switch
        then:
          - switch.turn_off: mic_mute_switch
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    # Only set the error phase if the error code is different than duplicate_wake_up_detected or stt-no-text-recognized
    # These two are ignored for a better user experience
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    # If the error code is cloud-auth-failed, serve a local audio file guiding the user.
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "error_cloud_expired"
  # When the voice assistant starts: Play a wake up sound, duck audio.
    - logger.log:
        format: "❌ VA: ERROR | Code: %d | TTS: %d | Audio: %d | Phase: %d"
        args: ['code.c_str()', 'id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(voice_assistant_phase)']
    - globals.set:
        id: is_tts_playing
        value: 'false'
    - globals.set:
        id: is_any_audio_playing
        value: 'false'
    - script.execute: auto_disable_amplifier
    - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
    - script.execute: control_leds
     
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20  # Number of dB quieter; higher implies more quiet, 0 implies full volume
        duration: 0.0s  # The duration of the transition (default is no transition)
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
    - logger.log:
        format: "🎤 VA:  LISTENING | Phase: %d | TTS: %d | Audio: %d"
        args: ['id(voice_assistant_phase)', 'id(is_tts_playing)', 'id(is_any_audio_playing)']
    - script.execute: update_satellite_sensors
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          # A nonempty x variable means a streaming TTS url was sent to the media player
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Start a script that would potentially enable the stop word if the response is longer than a second
          - script.execute: activate_stop_word_once
  on_tts_start:
    - logger.log:
        format: "🔊 VA:  TTS_START | Setting flags | Phase: %d"
        args: ['id(voice_assistant_phase)']
    - globals.set:
        id: is_tts_playing
        value: 'true'
    - globals.set:
        id: is_any_audio_playing
        value: 'true'
    - switch.turn_on: amplifier_enable
    - logger.log:
        format: "🔊 VA: TTS_START | Flags set | TTS: %d | Audio: %d | Amp: %d"
        args:  ['id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(amplifier_enable).state']
    - script.execute: update_satellite_sensors  # NEW
    - if:
        condition:
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
  
  on_tts_end:
    - logger.log:
        format: "🔊 VA: TTS_END | TTS data sent | TTS: %d | Audio: %d | Phase: %d"
        args:  ['id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(voice_assistant_phase)']
    - script.execute:
        id: send_tts_uri_event
        tts_uri:  !lambda 'return x;'
    # NEW: Add logging (but don't clear flags - let media_player handle it)
    - logger.log: "TTS data sent (speaker may still be playing)"
  
  on_stt_end:
    # EXISTING: Keep as-is
    - logger.log:
        format: "📝 VA: STT_END | Text: '%s' | Phase: %d"
        args: ['x.c_str()', 'id(voice_assistant_phase)']
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda 'return x;'

  # When the voice assistant ends ... 
  on_end:
    - logger.log: 
        format: "🏁 VA: END | Before wait | TTS: %d | Audio: %d | Phase: %d"
        args:  ['id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(voice_assistant_phase)']
    - wait_until:
        not:  
          voice_assistant.is_running: 
    - logger.log: "🏁 VA: END | After wait_until"
    - mixer_speaker.apply_ducking: 
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition: 
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:  
          - delay: 1s
    - lambda: |
        if (! id(is_tts_playing)) {
          ESP_LOGD("voice_assistant", "🏁 VA: END | No TTS playing, going to idle");
          id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
        } else {
          ESP_LOGD("voice_assistant", "🏁 VA: END | TTS flag still set, waiting for media player");
        }
    - script.execute: control_leds
    - logger.log:
        format: "🏁 VA: END | After control_leds | TTS:   %d | Audio: %d | Phase: %d"
        args: ['id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(voice_assistant_phase)']
    
    # MODIFIED: Check if media player is actually idle before clearing flags
    - delay: 5s  # Increased from 3s to give media player more time
    - logger.log:
        format: "⏰ VA: END | 5s timeout check | TTS: %d | Audio: %d | Phase:  %d | MP State: %d"
        args: ['id(is_tts_playing)', 'id(is_any_audio_playing)', 'id(voice_assistant_phase)', 'id(external_media_player).state']
    - if: 
        condition:
          lambda: |
            // Only clear if TTS flag is stuck AND media player is actually idle
            return id(is_tts_playing) && 
                   (id(external_media_player).state == media_player:: MEDIA_PLAYER_STATE_IDLE);
        then:
          - logger.log:
              format: "⚠️ SAFETY: Media player idle but TTS flags stuck - clearing!"
              args: []
          - globals.set:
              id: is_tts_playing
              value: 'false'
          - globals.set:
              id: is_any_audio_playing
              value:  'false'
          - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          - script.execute: control_leds
          - script.execute: auto_disable_amplifier
    - if:
        condition:
          lambda: |
            // Log if media player is still playing (expected behavior)
            return id(is_tts_playing) && 
                   (id(external_media_player).state != media_player::MEDIA_PLAYER_STATE_IDLE);
        then:
          - logger.log:
              format: "✅ SAFETY: Media player still active (State: %d) - flags OK"
              args: ['id(external_media_player).state']
  
  
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - lambda: |
        id(next_timer).publish_state(-1);
        id(next_timer_name).publish_state("-");
  
  # ...  rest of your timer handlers stay the same ...
  on_timer_started:
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        }
    - script.execute: control_leds
  
  on_timer_cancelled:
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        } else {
          id(next_timer).publish_state(-1);
          id(next_timer_name).publish_state("-");
        }
    - script.execute: control_leds
  
  on_timer_updated: 
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        }
    - script.execute: control_leds
  
  on_timer_tick: 
    # Reduce LED updates - only every 5 seconds instead of every second
    - lambda: |
        id(fetch_first_active_timer).execute();
        int seconds_left = id(first_active_timer).seconds_left;
        if (seconds_left % 5 == 0) {
          id(next_timer).publish_state(seconds_left);
        }
        if (id(current_led_effect) == "timer_tick") {
          id(control_leds_timer_ticking).execute();
        }

